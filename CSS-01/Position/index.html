<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div id="parent">
        <div id="child"></div>
    </div>
   
    
    <style>
       *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html,
body{
    height: 100%;
    width: 100%;
}

body{
    background-color: rgb(22, 22, 21);
}


#parent{
    height: 400px;
    width: 400px;
    background-color: crimson;
    position: relative;

}


#child{
    height: 50%;
    width: 50%;
    background-color: royalblue;
    position:absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%,-50%);
   
}












    </style>
</body>
</html>

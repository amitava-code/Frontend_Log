<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="box1">1</div>
    <div id="box2">2</div>
    <div id="box3">3</div>
    
    <style>
       *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html,
body{
    height: 100%;
    width: 100%;
}

body{
    background-color: rgb(22, 22, 21);
}


#box1{
    height: 200px;
    width: 200px;
    background-color: crimson;
    position:absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50% , -50%);
}


#box2{
    height: 200px;
    width: 200px;
    background-color: royalblue;
    position: absolute;
    left: 30%;
}

#box3{
    height: 200px;
    width: 200px;
    background-color: rgb(65, 225, 78);
}










    </style>
</body>
</html>

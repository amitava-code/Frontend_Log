<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="box">1</div>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,body{
            height: 100%;
            width: 100%;

        }

        body{
            perspective: 1000px;
            background-color: black;
        }

        #box{
            height: 200px;
            width: 200px;
            background-color:burlywood ;
            position:absolute;
            top: 30%;
            left: 30%;
            transform: rotateX(70deg);

        }
    </style>
    
</body>
</html>
